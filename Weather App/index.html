<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="weather.css">
</head>
<body>

    <div class="container">
        <h2 class="title">🌦️ Weather App</h2>
        <div class="search">
            <input type="text" id="cityName" placeholder="Enter City Name...">
            <button id="searchBtn">Search</button>
        </div>
        
        <p id="loading"></p>
        <p id="error"></p>
        <p id="sunrise"></p>
        <p id="sunset"></p>

        <div class="data">
            
            <img id="weatherIcon" alt="Weather Image">
            <p id="city"></p>
            <p id="temperature"></p>
            <p id="sky"></p>
            <p id="humidity"></p>
            <p id="wind"></p>
            
        </div>
    </div>
    
    <script src="weather.js"></script>
</body>
</html>
